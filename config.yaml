# ============================================================
# Tactical Asset Allocation — Configuration
# ============================================================
# All scripts read this file.  To add or swap asset classes,
# edit the `assets` dict below; no code changes are needed.
# ============================================================

# ----------------------------------------------------------
# Asset universe
# ----------------------------------------------------------
assets:
  SPY: "US Large Cap (S&P 500)"
  EFA: "Foreign Developed (MSCI EAFE)"
  IEF: "US 10-Year Bonds"
  GSG: "Commodities (GSCI)"
  VNQ: "US REITs (NAREIT)"
  TLT: "US 20-Year Bonds (Long Duration)"
  BTC: "Bitcoin"
  GLD: "Gold (SPDR)"

# T-bill proxy used as the cash return when a signal is 0
cash_proxy: "BIL"

# ----------------------------------------------------------
# Long-history splice sources
# ----------------------------------------------------------
# Maps a ticker to the CSV file and column name that provides pre-ETF history.
# splice_data.py reads this to build the long-history + ETF splice for the
# monthly backtest.  To add a new spliced asset, add an entry here — no code
# changes needed.
#
# Fields per entry:
#   file   : path to the CSV (relative to project root)
#   column : column name inside that CSV that holds the price/return index
#
# Assets NOT listed here are included from their ETF launch date only.
long_history_sources:
  SPY:
    file: "data/raw/longhistory/sp500_shiller.csv"
    column: "SP500_TR"
  IEF:
    file: "data/raw/longhistory/bonds_fred.csv"
    column: "BONDS_TR"
  TLT:
    file: "data/raw/longhistory/tlt_proxy_dgs20.csv"
    column: "TLT_PROXY"
  GLD:
    file: "data/processed/gold_monthly.csv"
    column: "Gold"
  BTC:
    file: "data/raw/longhistory/btc_coinmetrics.csv"
    column: "BTC_TR"
  BIL:
    file: "data/raw/longhistory/tbill_fred.csv"
    column: "TBILL_TR"

# ----------------------------------------------------------
# Data settings
# ----------------------------------------------------------
# ----------------------------------------------------------
# Ticker overrides for Yahoo Finance
# ----------------------------------------------------------
# Some assets use a config key that differs from the Yahoo Finance ticker symbol
# (e.g. BTC → BTC-USD).  List them here; any key not present falls back to
# using the config key directly as the Yahoo ticker.
etf_ticker_overrides:
  BTC: "BTC-USD"

# ----------------------------------------------------------
# Data settings
# ----------------------------------------------------------
data:
  # ETF history fetch window (yfinance / Sub-Task 2a)
  # The effective common start for all 5 assets + BIL is ~2007-07
  etf_start_date: "1973-01-01"   # pull as far back as each ETF allows
  end_date: "latest"             # "latest" → today's date at runtime

  # Long-history fetch window (Shiller / FRED / Sub-Task 2b)
  longhistory_start_date: "1871-01-01"

  # ----------------------------------------------------------
  # Backtest window — controls which slice of the downloaded
  # data is actually used in report.py and plot.py.
  # Set to "latest" / null to use all available data.
  # ----------------------------------------------------------
  backtest_start_date: "2007-05-30"  # e.g. "2007-05-30" or "latest" for full history
  backtest_end_date: "2025-12-31"    # e.g. "2020-12-31" or "latest" for today

# ----------------------------------------------------------
# Strategy parameters
# ----------------------------------------------------------
strategy:
  # SMA look-back periods by frequency.
  # Monthly 10 ≈ Weekly 43 ≈ Daily 200 (standard equivalents).
  # Adjust here if you want to test other parameter values.
  sma_periods:
    monthly: 10
    weekly: 40
    daily: 200

  # Frequencies to run in the backtest and signal generator.
  # Remove entries to skip a frequency.
  rebalance_frequencies:
    - monthly
    - weekly
    - daily

  # How many months between full portfolio rebalances (equal-weight true-up).
  # 1  = Faber original — rebalance every month-end (current default)
  # 3  = quarterly
  # 6  = semi-annual
  # 12 = annual (year-end only)
  # Applies to the monthly frequency only. Entry/exit signals still fire
  # every month on the SMA signal; only the equal-weight normalisation across
  # all invested assets is deferred to every N months.
  rebalance_period_months: 1

  # Equal weight for all assets (1/N).
  # Override with a dict of ticker→weight if unequal weighting is desired,
  # e.g.:  weights: {SPY: 0.30, EFA: 0.20, IEF: 0.20, GSG: 0.15, VNQ: 0.15}
  weights: equal

# ----------------------------------------------------------
# Reporting
# ----------------------------------------------------------
reporting:
  # Risk-free rate used for Sharpe ratio calculation (annual, decimal).
  # Set to 0.0 to use excess-return Sharpe; or a fixed rate like 0.04.
  # "dynamic" uses the actual T-bill return series from the backtest.
  risk_free_rate: "dynamic"

  # Output paths (relative to project root)
  results_dir: "results"
  plots_dir: "plots"
  data_dir: "data"
